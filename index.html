const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7JLmbKqOmxzeysBpy-8IdZ3xyTliQzHZ7QqgkUcvABKSLCy80rj2F3XNRMpdqqUX3_A/exec";

async function cloudGetAll(){
  const res = await fetch(`${APPS_SCRIPT_URL}?t=${Date.now()}&secret=${encodeURIComponent(APP_SECRET)}`);
  if(!res.ok) throw new Error("cloud fetch failed: "+res.status);
  const data = await res.json();
  if(data.ok===false) throw new Error(data.error||"인증 실패 — APP_SECRET을 확인하세요");
  return data;
}
async function cloudPost(payload){
  // Content-Type text/plain 사유: Apps Script는 CORS preflight(OPTIONS)를 처리하지
  // 않으므로 simple request로 보내야 브라우저가 막지 않는다.
  const res = await fetch(APPS_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({...payload,secret:APP_SECRET})});
  if(!res.ok) throw new Error("cloud post failed: "+res.status);
  return await res.json();
}
async function cloudSet(key,value){
  const data=await cloudPost({action:"set",key,value});
  if(!data.ok) throw new Error(data.error||"저장 실패");
  return data;
}

// 서울 기준 아날로그 시계 — 상단 배너 상시 표시
function AnalogClock(){
  const [t,setT]=useState(seoulNow());
  useEffect(()=>{const iv=setInterval(()=>setT(seoulNow()),1000);return()=>clearInterval(iv);},[]);
  const sec=t.getSeconds(),min=t.getMinutes()+sec/60,hr=(t.getHours()%12)+min/60;
  const C=23,hand=(ang,len,w,color,cap)=>{const a=(ang-90)*Math.PI/180;return <line x1={C-Math.cos(a)*len*0.25} y1={C-Math.sin(a)*len*0.25} x2={C+Math.cos(a)*len} y2={C+Math.sin(a)*len} stroke={color} strokeWidth={w} strokeLinecap={cap||"round"}/>;};
  const ticks=[];for(let i=0;i<12;i++){const a=i*30*Math.PI/180,maj=i%3===0;ticks.push(<line key={i} x1={C+Math.sin(a)*(maj?16.5:18)} y1={C-Math.cos(a)*(maj?16.5:18)} x2={C+Math.sin(a)*20} y2={C-Math.cos(a)*20} stroke={maj?"#64748b":"#cbd5e1"} strokeWidth={maj?1.8:1} strokeLinecap="round"/>);}
  const hh=String(t.getHours()).padStart(2,"0"),mm=String(t.getMinutes()).padStart(2,"0");
  return(<div style={{display:"flex",alignItems:"center",gap:9,userSelect:"none"}} title="서울 표준시">
    <svg width="46" height="46" viewBox="0 0 46 46">
      <defs><radialGradient id="cface" cx="35%" cy="30%"><stop offset="0%" stopColor="#ffffff"/><stop offset="100%" stopColor="#eef2ff"/></radialGradient></defs>
      <circle cx={C} cy={C} r="22" fill="url(#cface)" stroke="#c7d2fe" strokeWidth="1.6"/>
      {ticks}
      {hand(hr*30,10.5,2.6,"#1e293b")}
      {hand(min*6,15,1.9,"#334155")}
      {hand(sec*6,17,1,"#6366f1","butt")}
      <circle cx={C} cy={C} r="2" fill="#6366f1"/>
    </svg>
    <div className="clock-digits" style={{lineHeight:1.15}}>
      <div style={{fontSize:15,fontWeight:700,color:"#1e293b",fontVariantNumeric:"tabular-nums"}}>{hh}:{mm}</div>
      <div style={{fontSize:10,color:"#94a3b8"}}>{t.getMonth()+1}월 {t.getDate()}일 ({WD[t.getDay()]}) · 서울</div>
    </div>
  </div>);
}

// 도넛 진행 게이지 — 체크박스 토글 시 stroke-dashoffset 트랜지션으로 차오름
function Donut({pct,color,size=118,stroke=13,sub}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  return(<div style={{position:"relative",width:size,height:size,flexShrink:0}}>
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c*(1-Math.min(pct,100)/100)}
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:"stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)"}}/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:size*0.22,fontWeight:800,color:"#1e293b",fontVariantNumeric:"tabular-nums"}}>{pct}%</span>
      {sub&&<span style={{fontSize:10.5,color:"#94a3b8",marginTop:1}}>{sub}</span>}
    </div>
  </div>);
}

// 진행 바 — width 트랜지션
function GaugeBar({pct,color,h=6}){
  return(<div style={{height:h,background:"#e2e8f0",borderRadius:h,overflow:"hidden"}}>
    <div style={{height:"100%",width:pct+"%",background:color,borderRadius:h,transition:"width .6s cubic-bezier(.22,1,.36,1)"}}/>
  </div>);
}

// 완료 체크박스 (모든 뷰 공통 — 토글하면 게이지가 실시간으로 차오른다)
function DoneBox({done,onToggle,size=17}){
  return(<div onClick={onToggle} style={{width:size,height:size,borderRadius:5,border:`2px solid ${done?"#6366f1":"#cbd5e1"}`,background:done?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"background .18s,border-color .18s"}}>
    {done&&<svg width="9" height="9" viewBox="0 0 9 9"><path d="M1 4.5L3.5 7L8 2" stroke="#fff" strokeWidth="1.7" fill="none" strokeLinecap="round"/></svg>}
  </div>);
}

      <span style={{fontSize:11,color:"#94a3b8"}}>{open?"▲ 닫기":"▼ 펼치기"}</span>
    </div>
    {open&&<div style={{padding:"2px 22px 13px"}}>
      {isWork?<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:"#94a3b8"}}>관련기관 / 금액 / 수행사 / 특이사항</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setRows(r=>[...r,{org:"",amount:"",executor:"",note:""}])} style={{padding:"4px 10px",borderRadius:6,background:"#f1f5f9",color:"#475569",border:"none",fontSize:11,cursor:"pointer",fontWeight:600}}>＋ 항목</button>
            <button onClick={()=>onUpdate(rows,"details")} style={{padding:"4px 10px",borderRadius:6,background:"#6366f1",color:"#fff",border:"none",fontSize:11,cursor:"pointer",fontWeight:600}}>저장</button>
          </div>
        </div>
        {rows.length===0&&<div style={{fontSize:12,color:"#cbd5e1"}}>항목 없음</div>}
        {rows.map((d,i)=>(<div key={i} style={{display:"flex",gap:4,marginBottom:6,alignItems:"center"}}>
          <input style={{...si,flex:0.8}} placeholder="기관" value={d.org} onChange={e=>setRows(r=>r.map((x,j)=>j===i?{...x,org:e.target.value}:x))}/>
          <input style={{...si,flex:0.8}} placeholder="금액" value={d.amount} onChange={e=>setRows(r=>r.map((x,j)=>j===i?{...x,amount:e.target.value}:x))}/>
          <input style={{...si,flex:0.8}} placeholder="수행사" value={d.executor||""} onChange={e=>setRows(r=>r.map((x,j)=>j===i?{...x,executor:e.target.value}:x))}/>
          <input style={{...si,flex:1}} placeholder="특이사항" value={d.note} onChange={e=>setRows(r=>r.map((x,j)=>j===i?{...x,note:e.target.value}:x))}/>
          <span onClick={()=>setRows(r=>r.filter((_,j)=>j!==i))} style={{cursor:"pointer",color:"#cbd5e1",fontSize:13,flexShrink:0}}>✕</span>
        </div>))}</>:<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:"#94a3b8"}}>비고</span>
          <button onClick={()=>onUpdate(notes,"notes")} style={{padding:"4px 10px",borderRadius:6,background:"#6366f1",color:"#fff",border:"none",fontSize:11,cursor:"pointer",fontWeight:600}}>저장</button>
        </div>
        <textarea style={{...si,minHeight:60,resize:"vertical",fontFamily:"inherit"}} placeholder="비고" value={notes} onChange={e=>setNotes(e.target.value)}/></>}
    </div>}
  </div>);
}

// 대시보드 뷰 — WORK·LIFE 동시 표시 (색·섹션 구분, 창 전환 없음)

function SectionPanel({cat,tasks,projects,PM,onToggle,widgets}){
  const color=CC[cat],dark=CAT_DARK[cat],tint=cat==="WORK"?"#eff6ff":"#ecfdf5",border=cat==="WORK"?"#bfdbfe":"#a7f3d0";
  const ts=tasks.filter(t=>(t.category||"WORK")===cat);
  const total=ts.length,done=ts.filter(t=>t.done).length,pct=total?Math.round(done/total*100):0;
  const open=ts.filter(t=>!t.done);
  const today=open.filter(t=>t.due===toDay()).length;
  const urgent=open.filter(t=>t.due&&daysLeft(t.due)>=0&&daysLeft(t.due)<=7).length;
  const overdue=open.filter(t=>t.due&&daysLeft(t.due)<0).length;
  const projRows=projects.map(p=>{const pts=ts.filter(t=>t.pid===p.id);if(!pts.length)return null;const pd=pts.filter(t=>t.done).length;return{p,total:pts.length,done:pd,pct:Math.round(pd/pts.length*100)};}).filter(Boolean);
  const upList=[...open].sort((a,b)=>(a.due||"9999")>(b.due||"9999")?1:-1).slice(0,6);
  const kpi=[{l:"진행중",n:open.length,c:"#475569"},{l:"오늘 마감",n:today,c:today?"#ef4444":"#94a3b8"},{l:"임박(7일)",n:urgent,c:urgent?"#f59e0b":"#94a3b8"},{l:"기한초과",n:overdue,c:overdue?"#ef4444":"#94a3b8"}];
  const dLbl=due=>{const dl=daysLeft(due);if(dl===null)return"";if(dl<0)return`${Math.abs(dl)}일 초과`;if(dl===0)return"오늘";if(dl===1)return"내일";return`${dl}일 후`;};
  return(<div style={{background:"#fff",borderRadius:16,border:`1.5px solid ${border}`,boxShadow:"0 2px 10px rgba(0,0,0,.06)",overflow:"hidden",animation:"fadeUp .3s ease"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 18px",background:tint,borderBottom:`1px solid ${border}`}}>
      <span style={{display:"flex",alignItems:"center",gap:8,fontWeight:800,fontSize:14,color:dark}}>
        <span style={{width:10,height:10,borderRadius:"50%",background:color,display:"inline-block"}}/>
        {cat==="WORK"?"WORK · 업무":"LIFE · 일상"}
      </span>
      <span style={{fontSize:12,color:dark,fontWeight:600}}>{done}/{total} 완료</span>
    </div>
    <div style={{padding:"16px 18px",display:"flex",flexDirection:"column",gap:16}}>
      {(widgets.gauge||widgets.kpi)&&<div style={{display:"flex",alignItems:"center",gap:18,flexWrap:"wrap"}}>
        {widgets.gauge&&<Donut pct={pct} color={color} sub={`${done}/${total}`}/>}
        {widgets.kpi&&<div style={{flex:1,minWidth:180,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {kpi.map(x=>(<div key={x.l} style={{background:"#f8fafc",borderRadius:10,padding:"9px 12px",borderLeft:`3px solid ${x.c}`}}>
            <div style={{fontSize:19,fontWeight:800,color:x.c,fontVariantNumeric:"tabular-nums"}}>{x.n}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{x.l}</div>
          </div>))}
        </div>}
      </div>}
      {widgets.proj&&projRows.length>0&&<div>
        <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:8}}>프로젝트 진행률</div>
        {projRows.map(r=>(<div key={r.p.id} style={{marginBottom:9}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:12.5,fontWeight:600,color:"#1e293b",display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:r.p.color,display:"inline-block"}}/>{r.p.name}
              {r.p.deadline&&(()=>{const dl=daysLeft(r.p.deadline);return<span style={{fontSize:10,fontWeight:700,color:dl<0?"#ef4444":dl<=7?"#f59e0b":"#94a3b8"}}>{dl<0?`기한 ${Math.abs(dl)}일 초과`:dl===0?"기한 오늘":`D-${dl}`}</span>;})()}
            </span>
            <span style={{fontSize:11,color:"#94a3b8",fontVariantNumeric:"tabular-nums"}}>{r.done}/{r.total} · {r.pct}%</span>
          </div>
          <GaugeBar pct={r.pct} color={r.p.color}/>
        </div>))}
      </div>}
      {widgets.list&&<div>
        <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:6}}>할 일 (마감 임박순 — 체크하면 게이지가 채워집니다)</div>
        {upList.length===0&&<div style={{fontSize:12.5,color:"#cbd5e1",padding:"6px 0"}}>남은 할 일이 없습니다 🎉</div>}
        {upList.map(t=>{const dl=daysLeft(t.due);return(
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 2px",borderBottom:"1px solid #f1f5f9"}}>
            <DoneBox done={t.done} onToggle={()=>onToggle(t.id)} size={16}/>

// 다가오는 7일 마감 분포 — WORK/LIFE 스택 막대 (2px 간격, 직접 라벨)
function WeekChart({tasks}){
  const days=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);days.push(fmtD(d));}
  const data=days.map(ds=>{const dt=tasks.filter(t=>!t.done&&t.due===ds);return{ds,w:dt.filter(t=>(t.category||"WORK")==="WORK").length,l:dt.filter(t=>t.category==="LIFE").length};});
  const max=Math.max(1,...data.map(d=>d.w+d.l));
  const H=72;
  return(<div style={{background:"#fff",borderRadius:16,border:"1.5px solid #e2e8f0",boxShadow:"0 2px 10px rgba(0,0,0,.06)",padding:"14px 18px",animation:"fadeUp .3s ease"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontSize:12,fontWeight:700,color:"#1e293b"}}>다가오는 7일 마감 분포</span>
      <span style={{display:"flex",gap:12,fontSize:10.5,color:"#64748b"}}>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:CC.WORK,display:"inline-block"}}/>WORK</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:CC.LIFE,display:"inline-block"}}/>LIFE</span>
      </span>
    </div>
    {data.every(d=>d.w+d.l===0)?<div style={{fontSize:12.5,color:"#cbd5e1",padding:"8px 0"}}>다가오는 7일 내 마감 예정이 없습니다</div>:
    <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
      {data.map((d,i)=>{const tot=d.w+d.l,dt=new Date(d.ds+"T00:00:00");return(
        <div key={d.ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <span style={{fontSize:10.5,fontWeight:700,color:tot?"#334155":"#e2e8f0",fontVariantNumeric:"tabular-nums"}}>{tot||""}</span>
          <div style={{width:"100%",maxWidth:34,height:H,display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2}}>
            {d.l>0&&<div style={{height:Math.max(6,d.l/max*H),background:CC.LIFE,borderRadius:"4px 4px 2px 2px",transition:"height .5s ease"}}/>}
            {d.w>0&&<div style={{height:Math.max(6,d.w/max*H),background:CC.WORK,borderRadius:d.l>0?"2px":"4px 4px 2px 2px",transition:"height .5s ease"}}/>}
          </div>
          <span style={{fontSize:10,fontWeight:i===0?800:500,color:i===0?"#6366f1":dt.getDay()===0?"#f87171":dt.getDay()===6?"#60a5fa":"#94a3b8"}}>{i===0?"오늘":`${dt.getDate()}(${WD[dt.getDay()]})`}</span>
        </div>);})}
    </div>}
  </div>);
}

function monthWeeks(y,m){
  const last=new Date(y,m+1,0);
  const cur=new Date(y,m,1);cur.setDate(cur.getDate()-cur.getDay());
  const weeks=[];
  do{const w=[];for(let i=0;i<7;i++){w.push(new Date(cur));cur.setDate(cur.getDate()+1);}weeks.push(w);}while(cur<=last);
  return weeks;
}

function CalendarView({tasks,projects,PM,onToggle,onDelete,onQuickAdd,onGcal,gcalBusy}){

  const [selDay,setSelDay]=useState(null);
  const weeks=monthWeeks(ym.y,ym.m);
  const today=toDay();
  const MAXLANE=3,BAR_H=19,DATE_H=26;
  const spanOf=t=>{if(!t.due)return null;const s=t.start&&t.start<=t.due?t.start:t.due;return{s,e:t.due};};
  const move=n=>{const d=new Date(ym.y,ym.m+n,1);setYm({y:d.getFullYear(),m:d.getMonth()});setSelDay(null);};
  const dayTasks=ds=>tasks.filter(t=>{const sp=spanOf(t);return sp&&sp.s<=ds&&ds<=sp.e;});
  return(<div style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>
    <div style={{maxWidth:1060,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>move(-1)} style={{width:30,height:30,borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:13,color:"#475569"}}>◀</button>

          <button onClick={()=>{const n=seoulNow();setYm({y:n.getFullYear(),m:n.getMonth()});}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #c7d2fe",background:"#eef2ff",color:"#6366f1",fontSize:12,fontWeight:700,cursor:"pointer"}}>오늘</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{display:"flex",gap:10,fontSize:10.5,color:"#64748b"}}>

            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:CC.LIFE,display:"inline-block"}}/>LIFE</span>
          </span>
          <button onClick={onGcal} disabled={gcalBusy} style={{padding:"7px 13px",borderRadius:9,border:"none",background:gcalBusy?"#f1f5f9":"#0f9d58",color:gcalBusy?"#94a3b8":"#fff",fontSize:12,fontWeight:700,cursor:gcalBusy?"wait":"pointer"}}>{gcalBusy?"⏳ 동기화 중...":"📆 구글 캘린더로 보내기"}</button>
        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:660,background:"#fff",borderRadius:16,border:"1.5px solid #e2e8f0",boxShadow:"0 2px 10px rgba(0,0,0,.06)",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #e2e8f0",background:"#f8fafc"}}>
            {WD.map((w,i)=>(<div key={w} style={{padding:"8px 0",textAlign:"center",fontSize:11.5,fontWeight:700,color:i===0?"#f87171":i===6?"#60a5fa":"#64748b"}}>{w}</div>))}
          </div>
          {weeks.map((week,wi)=>{
            const ws=fmtD(week[0]),we=fmtD(week[6]);
            const segs=[];
            tasks.forEach(t=>{const sp=spanOf(t);if(!sp||sp.e<ws||sp.s>we)return;
              const sIdx=sp.s<=ws?0:week.findIndex(d=>fmtD(d)===sp.s);
              const eIdx=sp.e>=we?6:week.findIndex(d=>fmtD(d)===sp.e);
              if(sIdx<0||eIdx<0)return;
              segs.push({t,sIdx,eIdx,capL:sp.s>=ws,capR:sp.e<=we});});
            segs.sort((a,b)=>a.sIdx-b.sIdx||(b.eIdx-b.sIdx)-(a.eIdx-a.sIdx));
            const laneEnd=[];segs.forEach(sg=>{let L=0;while(laneEnd[L]!==undefined&&laneEnd[L]>=sg.sIdx)L++;laneEnd[L]=sg.eIdx;sg.lane=L;});
            const visLanes=Math.min(Math.max(0,...segs.map(s=>s.lane+1),0),MAXLANE);
            const overflowByDay=week.map((d,di)=>segs.filter(s=>s.lane>=MAXLANE&&s.sIdx<=di&&di<=s.eIdx).length);
            const rowH=DATE_H+visLanes*(BAR_H+3)+(overflowByDay.some(n=>n>0)?16:6);
            return(<div key={wi} style={{position:"relative",height:rowH,borderBottom:wi<weeks.length-1?"1px solid #eef2f7":"none"}}>
              <div style={{position:"absolute",inset:0,display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {week.map((d,di)=>{const ds=fmtD(d),inM=d.getMonth()===ym.m,isT=ds===today;
                  return(<div key={di} onClick={()=>setSelDay(ds)} style={{borderRight:di<6?"1px solid #eef2f7":"none",cursor:"pointer",background:isT?"#eef2ff":inM?"transparent":"#fafbfd",position:"relative"}}>
                    <div style={{position:"absolute",top:4,left:6,width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11.5,fontWeight:isT?800:600,background:isT?"#6366f1":"transparent",color:isT?"#fff":!inM?"#cbd5e1":d.getDay()===0?"#f87171":d.getDay()===6?"#60a5fa":"#475569"}}>{d.getDate()}</div>
                    {overflowByDay[di]>0&&<div style={{position:"absolute",bottom:2,left:6,fontSize:9.5,fontWeight:700,color:"#94a3b8"}}>+{overflowByDay[di]}</div>}
                  </div>);})}
              </div>
              {segs.filter(s=>s.lane<MAXLANE).map((sg,si)=>{const c=PM[sg.t.pid]?.color||CC[sg.t.category]||"#94a3b8";
                return(<div key={si} onClick={()=>setSelDay(sg.t.due)} title={sg.t.title}
                  style={{position:"absolute",top:DATE_H+sg.lane*(BAR_H+3),left:`calc(${sg.sIdx/7*100}% + 3px)`,width:`calc(${(sg.eIdx-sg.sIdx+1)/7*100}% - 6px)`,height:BAR_H,
                    background:sg.t.done?"#e2e8f0":c,color:sg.t.done?"#94a3b8":"#fff",
                    borderRadius:`${sg.capL?9:2}px ${sg.capR?9:2}px ${sg.capR?9:2}px ${sg.capL?9:2}px`,
                    fontSize:10.5,fontWeight:700,lineHeight:`${BAR_H}px`,padding:"0 7px",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",cursor:"pointer",
                    textDecoration:sg.t.done?"line-through":"none",boxShadow:sg.t.done?"none":"0 1px 2px rgba(0,0,0,.14)",border:"1px solid rgba(255,255,255,.55)"}}>
                  {(sg.t.category==="LIFE"?"🟢 ":"")+sg.t.title}
                </div>);})}
            </div>);})}
        </div>
      </div>
      <div style={{fontSize:10.5,color:"#94a3b8",marginTop:8}}>· 막대는 시작일~마감일 기간입니다. 날짜 칸을 클릭하면 상세 확인·바로 추가할 수 있습니다.</div>
    </div>
    {selDay&&<DayPanel ds={selDay} tasks={dayTasks(selDay)} projects={projects} PM={PM} onClose={()=>setSelDay(null)} onToggle={onToggle} onDelete={onDelete} onQuickAdd={onQuickAdd}/>}
  </div>);
}

      XLSX.utils.book_append_sheet(wb,ws,expOpt.format==="byDate"?"날짜순":"전체");
    }

      <div style={{display:"flex",gap:4,background:"#f1f5f9",borderRadius:11,padding:3}}>
        {TABS.map(t=>(<button key={t.id} onClick={()=>setView(t.id)} style={{padding:"7px 14px",borderRadius:9,border:"none",background:view===t.id?"#6366f1":"transparent",color:view===t.id?"#fff":"#64748b",fontSize:12.5,fontWeight:700,cursor:"pointer",transition:"background .2s"}}>{t.l}</button>))}
      </div>
      <button onClick={openAddTask} style={{...b("#6366f1"),marginLeft:"auto"}}>＋ 태스크</button>

        </div>

          {selPid==="ALL"&&["전체","WORK","LIFE"].map(c=>(<button key={c} onClick={()=>setCatFilter(c)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${catFilter===c?(c==="WORK"?"#3b82f6":c==="LIFE"?"#10b981":"#6366f1"):"#e2e8f0"}`,background:catFilter===c?(c==="WORK"?"#3b82f6":c==="LIFE"?"#10b981":"#6366f1"):"transparent",color:catFilter===c?"#fff":"#64748b",fontSize:11,cursor:"pointer",fontWeight:catFilter===c?600:400}}>{c==="전체"?"🗂 전체":c}</button>))}
          {selPid==="ALL"&&<div style={{width:1,height:16,background:"#e2e8f0",margin:"0 2px"}}/>}
          {["마감임박","진행중","완료","기한초과","전체"].map(f=>(<button key={f} onClick={()=>setFilter(f)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===f?"#6366f1":"#e2e8f0"}`,background:filter===f?"#6366f1":"transparent",color:filter===f?"#fff":"#64748b",fontSize:11,cursor:"pointer",fontWeight:filter===f?600:400}}>{f}</button>))}

            </div>);

          {tokenState==="old-backend"&&"⚠️ 백엔드 구버전 — Apps Script에 Code.gs v2 재배포 필요 (사용법.md)"}

          <div style={{fontSize:11,color:"#92400e",marginBottom:7,display:tokenState==="set"?"none":"block"}}>

      {notionErr&&<div style={{background:"#fef2f2",borderRadius:8,padding:"9px 13px",marginBottom:12,fontSize:12,color:"#ef4444",whiteSpace:"pre-line"}}>{notionErr}</div>}

      <div onClick={()=>setShowDbChange(v=>!v)} style={{fontSize:11.5,color:"#94a3b8",cursor:"pointer",userSelect:"none",marginBottom:8}}>{showDbChange?"▲":"▼"} 다른 DB로 연결 변경 (고급)</div>
      {showDbChange&&<div style={{border:"1px solid #e2e8f0",borderRadius:10,padding:12,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6}}>방법 A — DB 목록 자동 조회</div>
        <button onClick={loadNotionDbs} disabled={loadingDbs} style={{...b(loadingDbs?"#f1f5f9":"#6366f1",loadingDbs?"#94a3b8":undefined),width:"100%",marginBottom:notionDbs.length>0?8:10,fontSize:12,justifyContent:"center"}}>{loadingDbs?"⏳ 조회 중...":"🔍 Notion DB 목록 불러오기"}</button>
        {notionDbs.length>0&&<select style={{...inp,marginBottom:10}} value={selDbId} onChange={e=>setSelDbId(e.target.value)}><option value="">선택하세요</option>{notionDbs.map(db=><option key={db.id} value={db.id}>{db.title}</option>)}</select>}
        <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6}}>방법 B — DB URL 직접 입력</div>
        <input style={{...inp,fontSize:12}} placeholder="https://www.notion.so/... (⚠️ 페이지가 아닌 DB 전체 페이지 URL)" value={manualDbUrl} onChange={e=>setManualDbUrl(e.target.value)}/>
        {manualDbUrl&&<div style={{fontSize:11,color:extractDbId(manualDbUrl)?"#059669":"#ef4444",marginTop:4}}>{extractDbId(manualDbUrl)?`✓ ID 인식됨: ${extractDbId(manualDbUrl)}`:"⚠️ 유효한 Notion URL/ID를 찾을 수 없음"}</div>}
        <div style={{fontSize:10,color:"#94a3b8",marginTop:6}}>※ 여러 보기가 모인 대시보드 페이지 URL이 아니라, 표 DB를 전체 페이지로 열었을 때의 URL이어야 합니다.</div>
      </div>}

      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>{setShowNotion(false);setNotionErr("");}} style={b("#f1f5f9","#64748b")}>닫기</button>
        {showDbChange&&<button onClick={saveNotionCfg} style={b("#6366f1")}>연결 저장</button>}
      </div>
    </div></div>)}

    {showAddProj&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setShowAddProj(false)}><div style={{background:"#fff",borderRadius:14,padding:22,width:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>{editingProjId?"✏ 프로젝트 수정":"새 프로젝트"}</div>
      <label style={lbl}>프로젝트명</label><input style={{...inp,marginBottom:14}} value={newProj.name} onChange={e=>setNewProj(p=>({...p,name:e.target.value}))} placeholder="프로젝트명" autoFocus onKeyDown={e=>e.key==="Enter"&&saveProject()}/>
      <div style={{display:"flex",gap:8,marginBottom:14}}><label style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,border:`2px solid ${newProj.category==="WORK"?"#6366f1":"#e2e8f0"}`,background:newProj.category==="WORK"?"#eef2ff":"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:newProj.category==="WORK"?"#6366f1":"#94a3b8"}}><input type="radio" checked={newProj.category==="WORK"} onChange={()=>setNewProj(p=>({...p,category:"WORK"}))} style={{accentColor:"#6366f1"}}/><span style={{color:newProj.category==="WORK"?"#1e293b":"#64748b"}}>💼 WORK</span></label><label style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,border:`2px solid ${newProj.category==="LIFE"?"#10b981":"#e2e8f0"}`,background:newProj.category==="LIFE"?"#ecfdf5":"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:newProj.category==="LIFE"?"#10b981":"#94a3b8"}}><input type="radio" checked={newProj.category==="LIFE"} onChange={()=>setNewProj(p=>({...p,category:"LIFE"}))} style={{accentColor:"#10b981"}}/><span style={{color:newProj.category==="LIFE"?"#1e293b":"#64748b"}}>🎯 LIFE</span></label></div>
      <label style={lbl}>색상 선택</label><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}><input type="color" value={newProj.color} onChange={e=>setNewProj(p=>({...p,color:e.target.value}))} style={{width:50,height:40,borderRadius:8,border:"1px solid #e2e8f0",cursor:"pointer"}}/><div style={{display:"flex",gap:6}}>{COLORS.map(c=><div key={c} onClick={()=>setNewProj(p=>({...p,color:c}))} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:newProj.color===c?"3px solid #1e293b":"1px solid #e2e8f0",transition:"border .2s"}}/>)}</div></div>
      <label style={lbl}>프로젝트 기한 <span style={{fontWeight:400}}>(선택)</span></label>
      <input type="date" style={{...inp,marginBottom:14,maxWidth:200}} value={newProj.deadline} onChange={e=>setNewProj(p=>({...p,deadline:e.target.value}))}/>
      {newProj.category==="WORK"&&(<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><label style={{...lbl,marginBottom:0}}>관련기관 / 금액 / 수행사 / 특이사항</label><button onClick={()=>setNewProj(p=>({...p,details:[...p.details,{org:"",amount:"",executor:"",note:""}]}))} style={{...b("#f1f5f9","#64748b"),padding:"4px 10px",fontSize:11}}>＋ 항목</button></div>
      {newProj.details.map((d,i)=>(<div key={i} style={{display:"flex",gap:4,marginBottom:6,alignItems:"center"}}><input style={{...inp,flex:0.8}} placeholder="기관" value={d.org} onChange={e=>{const nd=[...newProj.details];nd[i]={...nd[i],org:e.target.value};setNewProj(p=>({...p,details:nd}));}}/><input style={{...inp,flex:0.8}} placeholder="금액" value={d.amount} onChange={e=>{const nd=[...newProj.details];nd[i]={...nd[i],amount:e.target.value};setNewProj(p=>({...p,details:nd}));}}/><input style={{...inp,flex:0.8}} placeholder="수행사" value={d.executor||""} onChange={e=>{const nd=[...newProj.details];nd[i]={...nd[i],executor:e.target.value};setNewProj(p=>({...p,details:nd}));}}/><input style={{...inp,flex:1}} placeholder="특이사항" value={d.note} onChange={e=>{const nd=[...newProj.details];nd[i]={...nd[i],note:e.target.value};setNewProj(p=>({...p,details:nd}));}}/>{newProj.details.length>1&&<span onClick={()=>setNewProj(p=>({...p,details:p.details.filter((_,j)=>j!==i)}))} style={{cursor:"pointer",color:"#94a3b8",fontSize:13,flexShrink:0}}>✕</span>}</div>))}</>)}
      {newProj.category==="LIFE"&&(<><label style={lbl}>비고</label><textarea style={{...inp,marginBottom:14,minHeight:60,resize:"vertical",fontFamily:"inherit"}} value={newProj.notes} onChange={e=>setNewProj(p=>({...p,notes:e.target.value}))} placeholder="비고 (선택)"/></>)}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>{setShowAddProj(false);setEditingProjId(null);}} style={b("#f1f5f9","#64748b")}>취소</button><button onClick={saveProject} style={b("#6366f1")}>{editingProjId?"저장":"추가"}</button></div>
    </div></div>)}

    {showAddTask&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>{setShowAddTask(false);setEditingTaskId(null);}}><div style={{background:"#fff",borderRadius:14,padding:22,width:440,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>{editingTaskId?"✏ 태스크 수정":"새 태스크"}</div>
      <label style={lbl}>태스크명</label><input style={{...inp,marginBottom:10}} value={newTask.title} onChange={e=>setNewTask(p=>({...p,title:e.target.value}))} placeholder="태스크명" autoFocus onKeyDown={e=>e.key==="Enter"&&saveTask()}/>
      <label style={lbl}>프로젝트</label>
      <select style={{...inp,marginBottom:10}} value={newTask.pid||(selPid!=="ALL"?selPid:projects[0]?.id||"")} onChange={e=>{const proj=projects.find(p=>p.id===e.target.value);setNewTask(p=>({...p,pid:e.target.value,category:proj?.category||"WORK"}));}}>
        {projects.map(p=><option key={p.id} value={p.id}>{p.name} {p.category==="WORK"?"(💼)":"(🎯)"}</option>)}
      </select>
      {projects.find(p=>p.id===newTask.pid)?.deadline&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:10,fontStyle:"italic"}}>📌 프로젝트 기한: {projects.find(p=>p.id===newTask.pid)?.deadline}</div>}
      <div style={{display:"flex",gap:8,marginBottom:10}}><div style={{flex:1}}><label style={lbl}>카테고리</label><select style={inp} value={newTask.category} onChange={e=>setNewTask(p=>({...p,category:e.target.value}))} disabled>{CAT_OPTS.map(c=><option key={c}>{c}</option>)}</select></div><div style={{flex:1.6}}><label style={lbl}>상태</label><select style={inp} value={newTask.status} onChange={e=>setNewTask(p=>({...p,status:e.target.value}))}>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}</select></div></div>
      <div style={{marginBottom:10}}><label style={lbl}>시작일 <span style={{fontWeight:400}}>(선택)</span></label><input type="date" style={inp} value={newTask.start} onChange={e=>setNewTask(p=>({...p,start:e.target.value}))}/></div>
      <div style={{marginBottom:10}}><label style={lbl}>마감일</label><input type="date" style={inp} value={newTask.due} onChange={e=>setNewTask(p=>({...p,due:e.target.value}))}/></div>
      {newTask.start&&newTask.due&&new Date(newTask.due)>=new Date(newTask.start)&&<div style={{fontSize:11,color:"#6366f1",marginBottom:8,fontWeight:600}}>📅 기간: {Math.ceil((new Date(newTask.due)-new Date(newTask.start))/86400000)+1}일</div>}
      <label style={lbl}>반복 주기</label>
      <select style={{...inp,marginBottom:10}} value={newTask.recurrence} onChange={e=>setNewTask(p=>({...p,recurrence:e.target.value,recurrencePattern:{}}))}>
        {RECURRENCE_OPTS.map(r=><option key={r}>{r}</option>)}
      </select>
      {newTask.recurrence==="weekly"&&<><label style={lbl}>반복 요일 선택</label><div style={{display:"flex",gap:4,marginBottom:10}}>{WD.map((w,i)=><button key={i} onClick={()=>{const wd=newTask.recurrencePattern?.weekdays||[];const idx=wd.indexOf(i);if(idx>-1){const nwd=[...wd];nwd.splice(idx,1);setNewTask(p=>({...p,recurrencePattern:{weekdays:nwd}}));}else{setNewTask(p=>({...p,recurrencePattern:{weekdays:[...(p.recurrencePattern?.weekdays||[]),i].sort()}}));}}} style={{width:28,height:28,borderRadius:6,border:`2px solid ${(newTask.recurrencePattern?.weekdays||[]).includes(i)?"#6366f1":"#cbd5e1"}`,background:(newTask.recurrencePattern?.weekdays||[]).includes(i)?"#6366f1":"#fff",color:(newTask.recurrencePattern?.weekdays||[]).includes(i)?"#fff":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>{w}</button>)}}</div></>}
      {newTask.recurrence==="monthly"&&<><label style={lbl}>반복 일자</label><input type="number" style={{...inp,marginBottom:10,maxWidth:80}} min="1" max="31" value={newTask.recurrencePattern?.monthday||1} onChange={e=>setNewTask(p=>({...p,recurrencePattern:{monthday:Number(e.target.value)}}))} placeholder="1"/></>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><button onClick={()=>{setShowAddTask(false);setEditingTaskId(null);}} style={b("#f1f5f9","#64748b")}>취소</button><button onClick={saveTask} style={b("#6366f1")}>{editingTaskId?"저장":"추가"}</button></div>
    </div></div>)}

    {showExport&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setShowExport(false)}><div style={{background:"#fff",borderRadius:14,padding:22,width:360,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📥 엑셀 내보내기</div>
      <label style={lbl}>범위</label><select style={{...inp,marginBottom:10}} value={expOpt.scope} onChange={e=>setExpOpt(o=>({...o,scope:e.target.value,projId:""}))}><option value="all">전체 프로젝트</option><option value="project">특정 프로젝트</option></select>
      {expOpt.scope==="project"&&<><label style={lbl}>프로젝트 선택</label><select style={{...inp,marginBottom:10}} value={expOpt.projId} onChange={e=>setExpOpt(o=>({...o,projId:e.target.value}))}><option value="">선택하세요</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></>}
      <label style={lbl}>형식</label>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>{[{v:"byProject",l:"📁 프로젝트별 (시트 분리)"},{v:"byDate",l:"📅 날짜순"},{v:"all",l:"📋 전체 목록"}].map(o=>(<label key={o.v} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12.5,color:"#1e293b"}}><input type="radio" name="fmt" value={o.v} checked={expOpt.format===o.v} onChange={()=>setExpOpt(x=>({...x,format:o.v}))} style={{accentColor:"#6366f1"}}/>{o.l}</label>))}</div>
      <div style={{fontSize:10.5,color:"#94a3b8",marginBottom:12}}>· 헤더 음영·테두리·상태 색상 서식이 적용됩니다</div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setShowExport(false)} style={b("#f1f5f9","#64748b")}>취소</button><button onClick={doExport} style={b("#10b981")}>📥 내보내기</button></div>
    </div></div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
</script>
</body>
</html>
